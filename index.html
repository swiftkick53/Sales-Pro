
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0058A8" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Sales Pro" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <title>Sales Pro - HomeStars</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              'glass': 'rgba(255, 255, 255, 0.03)',
              'glass-border': 'rgba(255, 255, 255, 0.1)',
              'hs-blue': '#0058A8',
            },
            backgroundImage: {
              'sunset-gradient': 'linear-gradient(90deg, #FF2D95 0%, #FF9E2D 100%)',
              'electric-gradient': 'linear-gradient(90deg, #00C2FF 0%, #0058A8 100%)',
              'toxic-gradient': 'linear-gradient(90deg, #39FF14 0%, #00C2FF 100%)',
              'maturity-gradient': 'linear-gradient(90deg, #74cef0 0%, #fecdfa 100%)',
            }
          }
        }
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
        -webkit-font-smoothing: antialiased;
        transition: background-color 0.3s ease;
      }
      .dark body { background-color: #050505; color: #e5e7eb; }
      body { background-color: #f8fafc; color: #0f172a; }

      .glass-card {
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.08);
      }
      .dark .glass-card { box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8); }
      .light .glass-card { 
        background: rgba(255, 255, 255, 0.7); 
        border: 1px solid rgba(0, 0, 0, 0.05);
        box-shadow: 0 4px 24px 0 rgba(0, 0, 0, 0.05);
      }

      .custom-scrollbar::-webkit-scrollbar { width: 4px; }
      .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
      .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(128, 128, 128, 0.2); border-radius: 10px; }
      
      .resize-handle {
        width: 4px;
        cursor: col-resize;
        transition: background 0.2s;
        z-index: 50;
      }
      .resize-handle:hover { background: rgba(0, 88, 168, 0.5); }
      
      .glow-text { text-shadow: 0 0 15px rgba(0, 88, 168, 0.5); }
      input:focus { border-color: #0058A8 !important; outline: none; }

      @keyframes confetti-fall {
        0% { transform: translateY(-10vh) rotate(0deg) scale(1); opacity: 1; }
        50% { opacity: 1; }
        100% { transform: translateY(110vh) rotate(1080deg) scale(0.5); opacity: 0; }
      }
      .animate-confetti {
        animation: confetti-fall linear infinite;
      }
      @keyframes confetti-sway {
        0% { transform: translateY(-10vh) translateX(0) rotate(0deg); opacity: 1; }
        25% { translateX(30px); }
        50% { opacity: 1; transform: translateY(50vh) translateX(-30px) rotate(540deg); }
        100% { transform: translateY(110vh) translateX(20px) rotate(1080deg); opacity: 0; }
      }
      .animate-confetti-sway {
        animation: confetti-sway linear infinite;
      }
      @keyframes glow-ring {
        0% { transform: scale(0.5); opacity: 0.8; }
        50% { transform: scale(1.5); opacity: 0.2; }
        100% { transform: scale(2.5); opacity: 0; }
      }
      .animate-glow-ring {
        animation: glow-ring 2s ease-out infinite;
      }
      @keyframes celebration-enter {
        0% { transform: scale(0.3) translateY(40px); opacity: 0; }
        50% { transform: scale(1.05) translateY(-10px); opacity: 1; }
        100% { transform: scale(1) translateY(0); opacity: 1; }
      }
      .animate-celebration-enter {
        animation: celebration-enter 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      }
      @keyframes emoji-burst {
        0% { transform: scale(0) rotate(-30deg); opacity: 0; }
        50% { transform: scale(1.3) rotate(10deg); opacity: 1; }
        100% { transform: scale(1) rotate(0deg); opacity: 1; }
      }
      .animate-emoji-burst {
        animation: emoji-burst 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      }
      @keyframes shimmer {
        0% { background-position: -200% center; }
        100% { background-position: 200% center; }
      }
      .animate-shimmer {
        background: linear-gradient(90deg, #fff 0%, #74cef0 25%, #fecdfa 50%, #74cef0 75%, #fff 100%);
        background-size: 200% auto;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        animation: shimmer 3s linear infinite;
      }
      @keyframes star-float {
        0%, 100% { transform: translateY(0) scale(1); opacity: 0.6; }
        50% { transform: translateY(-20px) scale(1.2); opacity: 1; }
      }
      .animate-star-float {
        animation: star-float 2s ease-in-out infinite;
      }
    </style>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@^19.2.4",
        "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
        "react/": "https://esm.sh/react@^19.2.4/",
        "@google/genai": "https://esm.sh/@google/genai@^1.41.0"
      }
    }
    </script>
  <link rel="stylesheet" href="/index.css">
</head>
  <body class="overflow-hidden">
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
